name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-legacy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pytest
        run: python -m pip install pytest
      - name: Run Python tests (legacy)
        run: python -m pytest tests -q

  rust-authoritative:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: global-workspace-runtime-rs
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"
          components: rustfmt, clippy
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Build
        run: cargo build
      - name: Run tests
        run: cargo test --workspace --all-targets --all-features
      - name: Run proof
        run: cargo run -p runtime-cli -- proof
      - name: Oracle guard
        run: cargo test --workspace -- oracle
