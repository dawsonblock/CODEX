name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-legacy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package (editable)
        run: python -m pip install -e ".[test]"
      - name: Check action types
        run: python -m global_workspace_runtime.scripts.check_action_types
      - name: Check sentience claims
        run: python -m global_workspace_runtime.scripts.check_sentience_claims
      - name: Check no mv2
        run: python -m global_workspace_runtime.scripts.check_no_mv2 .
      - name: Check resource recovery
        run: python -m global_workspace_runtime.scripts.check_resource_recovery
      - name: Run Python tests (legacy)
        run: python -m pytest -q

  rust-authoritative:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: global-workspace-runtime-rs
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"
          components: rustfmt, clippy
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Build
        run: cargo build
      - name: Run tests
        run: cargo test --workspace --all-targets --all-features
      - name: Run proof
        run: cargo run -p runtime-cli -- proof --strict --long-horizon --nl --out ../artifacts/proof/current
      - name: Oracle guard
        run: cargo test --workspace -- oracle
