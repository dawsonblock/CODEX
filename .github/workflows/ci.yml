name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-legacy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check generated artifacts
        run: python3 scripts/check_no_generated_artifacts.py
      - name: Install package (editable)
        run: python -m pip install -e ".[test]"
      - name: Check action types
        run: python -m global_workspace_runtime.scripts.check_action_types
      - name: Check sentience claims
        run: python -m global_workspace_runtime.scripts.check_sentience_claims
      - name: Check no mv2
        run: python -m global_workspace_runtime.scripts.check_no_mv2 .
      - name: Run Python tests (legacy)
        run: python -m pytest -q
      - name: Check resource recovery
        run: python -m global_workspace_runtime.scripts.check_resource_recovery
      - name: Clean generated artifacts
        run: python3 scripts/clean_generated_artifacts.py
      - name: Final generated artifact check
        run: python3 scripts/check_no_generated_artifacts.py

  rust-authoritative:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: global-workspace-runtime-rs
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy
      - name: Check generated artifacts
        run: python3 ../scripts/check_no_generated_artifacts.py
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Build
        run: cargo build
      - name: Run tests
        run: cargo test --workspace --all-targets --all-features
      - name: Generate code coverage
        run: |
          if ! command -v cargo-tarpaulin &> /dev/null; then
            cargo install cargo-tarpaulin
          fi
          cargo tarpaulin --workspace --out Xml --timeout 600 \
            --exclude-files prove.rs symbolic.rs --output-dir ../coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ../coverage/cobertura.xml
          flags: rust
          fail_ci_if_error: false
      - name: Run proof
        run: |
          cargo run -p runtime-cli -- proof --strict --long-horizon --nl --out ../artifacts/proof/current
          cd ..
          python3 scripts/generate_retrieval_policy_report.py artifacts/proof/current
          python3 scripts/generate_answer_quality_report.py artifacts/proof/current
          python3 scripts/generate_ui_integration_report.py artifacts/proof/current
          cd global-workspace-runtime-rs
      - name: Oracle guard
        run: cargo test --workspace -- oracle
      - name: Clean generated artifacts
        run: python3 ../scripts/clean_generated_artifacts.py
      - name: Final generated artifact check
        run: python3 ../scripts/check_no_generated_artifacts.py

  ui-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui/codex-dioxus
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config
      - name: Run UI tests (with performance metrics)
        run: cargo test --bin codex-dioxus --release 2>&1
      - name: Report test results
        if: always()
        run: cargo test --bin codex-dioxus -- --nocapture 2>&1 | tail -20
      - name: Archive performance metrics
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: ui-performance-metrics
          path: ui/codex-dioxus/target/release/metrics*.json
          retention-days: 30
      - name: Performance baseline check (UI)
        run: |
          if cargo test --bin codex-dioxus --release 2>&1 | grep -q "FAILED\|0 passed"; then
            echo "❌ UI tests failed - check logs above"
            exit 1
          fi
          echo "✅ UI tests passed with performance instrumentation enabled"

  ui-provider-features:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui/codex-dioxus
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config
      - name: Run UI tests with provider features
        run: cargo test --all-targets --features ui-local-providers 2>&1 | tee ../../artifacts/proof/verification/ui_provider_feature_tests.log
      - name: Archive provider feature test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: ui-provider-feature-tests
          path: ../../artifacts/proof/verification/ui_provider_feature_tests.log
          retention-days: 30
      - name: Verify provider tests passed
        run: |
          if grep -q "test result: ok" ../../artifacts/proof/verification/ui_provider_feature_tests.log; then
            echo "✅ UI provider feature tests passed"
            exit 0
          else
            echo "❌ UI provider feature tests failed"
            exit 1
          fi
