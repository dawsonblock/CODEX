name: Rust

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: global-workspace-runtime-rs

    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy
      - name: Check generated artifacts
        run: python3 ../scripts/check_no_generated_artifacts.py
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Build
        run: cargo build --verbose
      - name: Run tests
        run: cargo test --workspace --all-targets --all-features --verbose
      - name: Run proof
        run: cargo run -p runtime-cli -- proof --strict --long-horizon --nl --out ../artifacts/proof/current
      - name: Clean generated Python artifacts
        run: python3 ../scripts/clean_python_artifacts.py
      - name: Final generated artifact check
        run: python3 ../scripts/check_no_generated_artifacts.py
